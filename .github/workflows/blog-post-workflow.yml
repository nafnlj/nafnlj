name: Latest blog post workflow
on:
  schedule: # Run workflow automatically
    - cron: '0 */3 * * *' # Runs every 3 hours
  workflow_dispatch: # Run workflow manually (without waiting for the cron to be called), through the GitHub Actions Workflow page directly
permissions:
  contents: write # To write the generated contents to the readme

jobs:
  update-readme-with-blog:
    name: Update this repo's README with latest blog posts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5  # ← Updated from v4 (Node.js 20 deprecated June 2, 2026)
      - name: Pull in blog posts
        uses: gautamkrishnar/blog-post-workflow@v1.9.4  # ← Pinned to v1.9.4 (pre-strict parsing)
        with:
          max_post_count: 9
          feed_list: "https://thenewleafjournal.com/author/naferrell/feed/"
